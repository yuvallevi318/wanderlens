async function resizeToThumbnail(dataURL, size = 400) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ratio = Math.min(size / img.width, size / img.height);
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.88));
    };
    img.src = dataURL;
  });
}

async function compressForAPI(dataURL, maxPx = 1024) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ratio = Math.min(maxPx / img.width, maxPx / img.height, 1);
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);

.wl-bar{width:90px;height:1px;background:rgba(201,168,76,0.18);position:relative;overflow:hidden;}
.wl-bar::after{content:'';position:absolute;top:0;left:-50%;width:50%;height:100%;background:#C9A84C;animation:wscan 1.5s ease-in-out infinite;}
.wl-result{border:1px solid rgba(255,255,255,0.08);padding:1.3rem;margin-bottom:1.1rem;background:#131210;}
.wl-rloc{display:flex;align-items:baseline;gap:0.65rem;margin-bottom:0.6rem;flex-wrap:wrap;}
.wl-rcity{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:400;color:#F0E8D2;}
.wl-rctry{font-size:0.74rem;letter-spacing:0.12em;}
.wl-rfact{font-size:0.79rem;color:#857A68;line-height:1.7;}
.wl-racts{margin-top:1.1rem;display:flex;gap:0.65rem;flex-wrap:wrap;}
.wl-btn-p{background:#C9A84C;border:none;color:#0A0908;padding:0.6rem 1.5rem;font-size:0.74rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.2s;}
.wl-btn-p:hover{opacity:0.88;}
.wl-btn-s{background:none;border:1px solid #3a3530;color:#6a6058;padding:0.6rem 1.1rem;font-size:0.74rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.wl-btn-s:hover{border-color:#6a6058;color:#a09080;}
.wl-err{font-size:0.76rem;color:#C94040;margin-top:0.7rem;line-height:1.5;}
.wl-notfound{font-size:0.76rem;color:#857A68;margin-top:0.65rem;line-height:1.5;padding:0.65rem;border-left:2px solid #3a3530;}

/* LIGHTBOX */
.wl-lb{position:fixed;inset:0;z-index:500;background:rgba(5,4,4,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;cursor:pointer;}
.wl-lb-inner{cursor:default;display:flex;flex-direction:column;align-items:center;width:100%;}
.wl-lb img{max-width:100%;max-height:68vh;object-fit:contain;display:block;}
.wl-lb-meta{margin-top:1.1rem;text-align:center;max-width:520px;}
.wl-lb-city{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:300;color:#F0E8D2;}
.wl-lb-ctry{font-size:0.7rem;letter-spacing:0.14em;margin-left:0.5rem;}
.wl-lb-fact{font-size:0.78rem;color:#857A68;line-height:1.7;margin-top:0.4rem;}
.wl-lb-close{position:absolute;top:1.25rem;right:1.5rem;background:none;border:none;color:#6a6058;font-size:1.4rem;cursor:pointer;line-height:1;transition:color 0.2s;}

@keyframes wpulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* NAME PROMPT */
.wl-name-overlay{position:fixed;inset:0;z-index:600;background:rgba(5,4,4,0.97);display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.wl-name-box{background:#131210;border:1px solid rgba(201,168,76,0.25);padding:2.5rem;max-width:420px;width:100%;}
.wl-name-input{width:100%;background:#0A0908;border:1px solid #3a3530;color:#F0E8D2;padding:0.7rem 0.9rem;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:0.75rem;}
.wl-name-input:focus{border-color:rgba(201,168,76,0.5);}

/* JOURNEY */
.wl-journey{margin-top:3.5rem;padding-top:3rem;border-top:1px solid rgba(255,255,255,0.06);}
.wl-journey-stats{display:flex;gap:2.5rem;margin-bottom:2rem;}
.wl-jstat-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:#C9A84C;line-height:1;}

.wl-jcard:active{cursor:grabbing;}
.wl-jcard:hover{background:#131210;}
.wl-jcard-over{border-top:2px solid #C9A84C !important;background:#131210;}
.wl-jcard-img{width:220px;height:160px;object-fit:cover;flex-shrink:0;display:block;}
.wl-jcard-nophoto{background:#1B1917;width:220px;height:160px;flex-shrink:0;}
.wl-jcard-info{width:220px;flex-shrink:0;padding:1.25rem 1.5rem;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid rgba(255,255,255,0.06);}
.wl-jcard-date{font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:#C9A84C;margin-bottom:0.4rem;}
.wl-jcard-city{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;color:#F0E8D2;line-height:1.2;}
.wl-jcard-country{font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:#484038;margin-top:0.25rem;}
.wl-jcard-fact{flex:1;padding:1.25rem 1.5rem;display:flex;align-items:center;}
.wl-jcard-fact p{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:#857A68;line-height:1.7;font-style:italic;}

.wl-jcard-pub:hover{color:#857A68;}
.wl-jcard-pub-on{color:#C9A84C !important;}

.st-toggle{background:#0A0908;border:1px solid rgba(201,168,76,0.4);color:#C9A84C;padding:0.4rem 0.9rem;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
